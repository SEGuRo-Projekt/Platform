clients:
  recorder:
    roles:
      - recorder

    groups:
      - services

  signature-recorder:
    roles:
      - recorder

    groups:
      - services

  scheduler:
    roles:
      - scheduler

    groups:
      - services

  notifier:
    roles:
      - notifier

    groups:
      - services

  notebook-executor:
    roles:
      - notebook-executor

    groups:
      - services

groups:
  services:
    roles:
      - store-defaults

roles:
  store-defaults:
    store:
      - object: "seguro"
        actions:
          - ListBucket
          - GetBucketLocation

  scheduler:
    broker:
      - topic: "#"
        actions:
          - Subscribe

    store:
      - object: "*"
        actions:
          - "*" # TODO: be more restrictive here

  notifier:
    broker:
      - topic: notifications
        actions:
          - Subscribe

  recorder:
    broker:
      - topic: data/#
        actions:
          - Subscribe

    store:
      - object: seguro/data/*
        actions:
          - PutObject

  signature-recorder:
    broker:
      - topic: signatures
        actions:
          - Subscribe

    store:
      - object: seguro/signatures/*
        actions:
          - PutObject

  notebook-executor:
    store:
      - object: "seguro/notebooks/#"
        actions:
          - GetObject
          - PutObject
